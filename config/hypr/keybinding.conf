# -----------------------------------------------------
# KEYBINDINGS CONFIGURATION
# -----------------------------------------------------
$mainMod = SUPER # Sets "Windows" key as main modifier


#########################
### Custom Keybinding ###
#########################

bind = $mainMod, V, exec, /home/hakuimaku/.local/bin/clip_menu
bind = $mainMod SHIFT, V, exec, cliphist wipe && notify-send "Clipboard" "Clear All History"
bind = $mainMod, F11, exec, /home/hakuimaku/.local/bin/record
bind = $mainMod, TAB, exec, /home/hakuimaku/.local/bin/quick_settings
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +2%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 2%-
bind = , XF86KbdBrightnessUp, exec, brightnessctl -d *::kbd_backlight set +33%
bind = , XF86KbdBrightnessDown, exec, brightnessctl -d *::kbd_backlight set 33%-
bind = , Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png | wl-copy && swappy -f -
bind = $mainMod, P, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png | wl-copy && swappy -f -
bind = $mainMod SHIFT, P, exec, grim - | tee ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png | wl-copy && swappy -f -
bind = $mainMod, B, exec, zen-browser &
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, L, exec, hyprsunset --temperature 3000
bind = $mainMod SHIFT, L, exec, pkill hyprsunset
bind = $mainMod, W, exec, /home/hakuimaku/.local/bin/waybar_toggle
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, K, exec, /home/hakuimaku/.local/bin/display_select
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, U, exec, /home/hakuimaku/.local/bin/toggle720p 0
bind = $mainMod, I, exec, /home/hakuimaku/.local/bin/toggle720p 1
bind = $mainMod, Y, exec, /home/hakuimaku/.local/bin/wallselect
bind = $mainMod SHIFT, Y, exec, /home/hakuimaku/.local/bin/wallmpvselect
bind = $mainMod, T, exec, ~/.local/bin/cava_manager --toggle



###################
### KEYBINDINGS ###
###################


# See https://wiki.hypr.land/Configuring/Keywords/


# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, A, togglefloating,
bind = $mainMod, X, pseudo, # dwindle
bind = $mainMod, Z, togglesplit, # dwindle

bind = $mainMod, E, exec, nemo

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, Grave, togglespecialworkspace, minimized

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod SHIFT, up, workspace, e-1
bind = $mainMod SHIFT, down, workspace, e+1


