################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
#monitor = eDP-1, 1280x720@60, 0x0, 1
monitor = eDP-1, 1920x1080@60, 0x0, 1
#monitor = eDP-1, 1920x1080@60, 0x0, 1.5

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon
exec-once = waybar
exec-once = swaync 
exec-once = fcitx5 -d
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprsunset --temperature 3000
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hypridle
exec-once = sway-audio-idle-inhibit
exec-once = /home/hakuimaku/.local/bin/haku
exec-once = /home/hakuimaku/.local/bin/welcome
exec-once = ~/.local/bin/cava_manager


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Toolkit backend
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Input method
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
# env = GTK_IM_MODULE,fcitx  # uncomment if you use GTK apps and want to use fcitx in them as well

# Scale factor
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,0 # Tắt auto để dùng scale cố định bên dưới
env = QT_SCALE_FACTOR,1.25

# Cursor
#env = XCURSOR_THEME,lliurex-cursors
#env = XCURSOR_SIZE,36

# User environment variables
source = ~/.config/hypr/env.conf

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0

    col.active_border = rgba(ffffff66)
    col.inactive_border = rgba(ffffff00)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 20 #10
    rounding_power = 10 #2

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 10
        render_power = 4
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 4
        passes = 1

        vibrancy = 0.1696
        popups = true
        new_optimizations = true
        xray = false
    }


}


####################
#### ANIMATIONS ####
####################
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = easeInOut, 0.65, 0, 0.35, 1

    # --- WINDOWS ---
    # Global windows style: slide
    animation = windows, 1, 6, myBezier
    animation = windowsIn, 1, 6, myBezier
    animation = windowsOut, 1, 10, myBezier
    animation = windowsMove, 1, 6, easeInOut

    # --- LAYERS (Waybar, Rofi, etc.) ---
    animation = layers, 1, 8, myBezier, slide
    animation = layersIn, 1, 8, myBezier
    animation = layersOut, 1, 14, myBezier

    # --- FADE EFFECTS ---
    animation = fade, 1, 10, default
    animation = fadeIn, 1, 10, default
    animation = fadeOut, 1, 10, default
    animation = fadeSwitch, 1, 14, default
    animation = fadeShadow, 1, 14, default
    animation = fadeDim, 1, 10, default

    animation = fadePopups, 1, 20, default
    
    # Layer
    animation = fadeLayers, 1, 10, default
    animation = fadeLayersIn, 1, 10, default
    animation = fadeLayersOut, 1, 10, default
    animation = fadePopups, 1, 10, default
    animation = fadePopupsIn, 1, 10, default
    animation = fadePopupsOut, 1, 10, default
    
    # ON/OFF animation for DPMS (monitor power off)
    animation = fadeDpms, 1, 20, default

    # --- BORDER ---
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, default, loop

    # --- WORKSPACES ---
    animation = workspaces, 1, 8, myBezier, slidefade
    animation = workspacesIn, 1, 8, myBezier, slidefade
    animation = workspacesOut, 1, 8, myBezier, slidefade
    
    # Special Workspace
    animation = specialWorkspace, 1, 6, myBezier, slidevert
    animation = specialWorkspaceIn, 1, 6, myBezier, slidevert
    animation = specialWorkspaceOut, 1, 6, myBezier, slidevert

    # --- OTHERS ---
    animation = zoomFactor, 1, 6, myBezier
    animation = monitorAdded, 1, 6, myBezier
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
source = ~/.config/hypr/keybinding.conf


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

xwayland {
  force_zero_scaling = true
}


# Always keep workspaces persistent
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# VS Code into magic workspace, accessible with SUPER + S
#windowrule = workspace special:magic, match:class code

layerrule = animation fade, match:namespace waybar

#windowrule = float on, match:class (?i)nemo
#windowrule = move center, match:class (?i)nemo
#windowrule = size 1280 720, match:class (?i)nemo
windowrule = opacity 0.8, match:class (?i)nemo


windowrule = opacity 0.8, match:class code
windowrule = opacity 0.8, match:class kitty
windowrule = opacity 0.8, match:class jetbrains.*


windowrule = float on, match:class mpv
windowrule = move center, match:class mpv
windowrule = size 1280 720, match:class mpv

windowrule = float on, match:class imv
windowrule = move center, match:class imv
windowrule = size 1280 720, match:class imv

windowrule = float on, match:class kitty-float
windowrule = size 1280 720, match:class kitty-float

windowrule = float on, match:class badapple
windowrule = size 1160 900, match:class badapple


# Rofi Animation - Slide from top
layerrule = animation slide top, match:namespace rofi
layerrule = dim_around on, match:namespace rofi
layerrule = blur on, match:namespace rofi
layerrule = blur_popups on, match:namespace rofi
layerrule = ignore_alpha 80%, match:namespace rofi

# --- Browser Save ---
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = move center, match:class xdg-desktop-portal-gtk
windowrule = size 600 600, match:class xdg-desktop-portal-gtk

#--- Haku Space ---
windowrule = float on, match:title seyclock
windowrule = float on, match:title seypipes
windowrule = float on, match:title seycava
windowrule = float on, match:title seycmd
windowrule = float on, match:title seymatrix
windowrule = float on, match:title seylavat

